<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-gradient" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#163251" />
      <stop offset="100%" stop-color="#0D1E30" />
    </radialGradient>

    <linearGradient id="metal-cian" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#062E3A" />
      <stop offset="25%" stop-color="#0F7A92" />
      <stop offset="50%" stop-color="#B8EEF9" />
      <stop offset="75%" stop-color="#0F7A92" />
      <stop offset="100%" stop-color="#062E3A" />
    </linearGradient>
    <linearGradient id="fill-cian" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B9EBB" />
      <stop offset="100%" stop-color="#0E6A80" />
    </linearGradient>

    <linearGradient id="metal-dorado" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C3610" />
      <stop offset="25%" stop-color="#C08830" />
      <stop offset="50%" stop-color="#F7E4B8" />
      <stop offset="75%" stop-color="#C08830" />
      <stop offset="100%" stop-color="#5C3610" />
    </linearGradient>
    <linearGradient id="fill-dorado" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DFB175" />
      <stop offset="100%" stop-color="#9C7338" />
    </linearGradient>

    <clipPath id="front-v-clip">
      <polygon points="290,0 600,0 600,600 0,600 0,280 290,280" />
    </clipPath>

    <path id="path-c" d="M 400,200 A 140,140 0 1,0 400,400" />
    <path id="path-v" d="M 240,130 L 320,470 L 460,130" />
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-gradient)" />

  <g>
    <use href="#path-v" stroke="url(#metal-dorado)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <use href="#path-v" stroke="url(#fill-dorado)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <g>
    <use href="#path-c" stroke="url(#metal-cian)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <use href="#path-c" stroke="url(#fill-cian)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <g clip-path="url(#front-v-clip)">
    <use href="#path-v" stroke="url(#metal-dorado)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <use href="#path-v" stroke="url(#fill-dorado)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
