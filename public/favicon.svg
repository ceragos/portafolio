<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>

    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#162844"/>
      <stop offset="100%" stop-color="#0D1E30"/>
    </radialGradient>

    <!-- Borde metálico dorado (C) -->
    <linearGradient id="gold-metal" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4A2808"/>
      <stop offset="20%"  stop-color="#B07820"/>
      <stop offset="48%"  stop-color="#FAE8B8"/>
      <stop offset="78%"  stop-color="#B07820"/>
      <stop offset="100%" stop-color="#4A2808"/>
    </linearGradient>

    <!-- Borde metálico cian (V) -->
    <linearGradient id="cyan-metal" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#041E28"/>
      <stop offset="20%"  stop-color="#0E6A82"/>
      <stop offset="48%"  stop-color="#C2F0FC"/>
      <stop offset="78%"  stop-color="#0E6A82"/>
      <stop offset="100%" stop-color="#041E28"/>
    </linearGradient>

  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <rect width="512" height="512" rx="104" stroke="#1B9EBB" stroke-width="12" stroke-opacity="0.3"/>

  <!-- C centrada (256,256), r=152, apertura ±58° a la derecha -->
  <!-- Se dibuja primero: la V cruza por encima -->
  <path d="M 337 385 A 152 152 0 1 0 337 127"
    stroke="url(#gold-metal)" stroke-width="72" stroke-linecap="round"/>
  <path d="M 337 385 A 152 152 0 1 0 337 127"
    stroke="#DFB175" stroke-width="62" stroke-linecap="round"/>

  <!-- V con brazos que cruzan la C: entran en ~(142,154) y (370,154) -->
  <!-- Punto inferior queda dentro del círculo de la C (r=118 < 152) -->
  <path d="M 94 56 L 256 382 L 418 56"
    stroke="url(#cyan-metal)" stroke-width="72" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 94 56 L 256 382 L 418 56"
    stroke="#1B9EBB" stroke-width="62" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
